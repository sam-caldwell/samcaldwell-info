name: Refresh data, build, and deploy

on:
  schedule:
    - cron: "30 11 * * *"   # daily at 11:30 UTC (~06:30 CT, after most FRED releases)
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      fcc_fetch:
        description: "Download FCC bulk data (~450 MB, takes several minutes)"
        required: false
        type: boolean
        default: false

# `pages: write` + `id-token: write` are required by actions/deploy-pages.
# `contents: write` is required to commit the refreshed data cache back to main.
permissions:
  contents: write
  pages: write
  id-token: write

# Prevent overlapping Pages deployments but let each cron tick complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Run unit + integration tests
        run: bun test tests/unit/ --bail 1 --isolate

      - name: Refresh data (FRED + GDELT + Media Cloud + EIA + BLS + BEA + FCC + build CSVs)
        timeout-minutes: 25
        env:
          FRED_API_KEY:         ${{ secrets.FRED_API_KEY }}
          MEDIA_CLOUD_API_KEY:  ${{ secrets.MEDIA_CLOUD_API_KEY }}
          NEWS_API_ORG_KEY:     ${{ secrets.NEWS_API_ORG_KEY }}
          EIA_API_KEY:          ${{ secrets.EIA_API_KEY }}
          BLS_API_KEY:          ${{ secrets.BLS_API_KEY }}
          BEA_API_KEY:          ${{ secrets.BEA_API_KEY }}
          FCC_FETCH:            ${{ inputs.fcc_fetch && '1' || '' }}
        run: bun run pipeline/index.ts

      - name: Commit refreshed data if changed
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: daily data refresh"
          file_pattern: "data/economy/*.csv data/economy/cache/*.csv data/presidential-economies/*.csv data/sentiment/*.csv data/sentiment/cache/*.csv data/cybersecurity/*.csv data/cybersecurity/cache/*.csv data/cybersecurity/cache/*.json data/cybersecurity/cache/*.csv.gz data/energy/*.csv data/energy/cache/*.csv data/west-texas/*.csv data/west-texas/cache/*.csv"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit FCC data if present
        if: inputs.fcc_fetch
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: FCC data refresh"
          file_pattern: "data/fcc/*.csv data/fcc/cache/*.csv"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build SpecifyJS site
        run: npm run build

      - name: Copy data to dist
        run: cp -r data dist/data

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  pdv:
    name: Post-Deploy Verification
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tests/pdv/package-lock.json

      - name: Install test dependencies
        working-directory: tests/pdv
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests/pdv
        run: npx playwright install --with-deps chromium

      - name: Run PDV tests
        working-directory: tests/pdv
        env:
          PDV_BASE_URL: ${{ needs.deploy.outputs.page_url || 'https://samcaldwell.info/' }}
          CI: "true"
        run: npx playwright test

      - name: Upload PDV report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pdv-report
          path: |
            tests/pdv/playwright-report/
            tests/pdv/test-results/
          retention-days: 14
