name: Refresh data, render, and deploy

on:
  schedule:
    - cron: "30 11 * * *"   # daily at 11:30 UTC (~06:30 CT, after most FRED releases)
  push:
    branches: [main]
  workflow_dispatch: {}

# `pages: write` + `id-token: write` are required by actions/deploy-pages.
# `contents: write` is required to commit the refreshed data cache back to main.
permissions:
  contents: write
  pages: write
  id-token: write

# Prevent overlapping Pages deployments but let each cron tick complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::echarts4r
            any::plotly
            any::reactable
            any::sparkline
            any::crosstalk
            any::dplyr
            any::tidyr
            any::readr
            any::purrr
            any::scales
            any::htmltools
            any::rprojroot
            any::lubridate
            any::tibble
            any::fredr
            any::httr2
            any::jsonlite

      - name: Refresh data (FRED + GDELT + Media Cloud + EIA + build CSVs)
        env:
          FRED_API_KEY:         ${{ secrets.FRED_API_KEY }}
          MEDIA_CLOUD_API_KEY:  ${{ secrets.MEDIA_CLOUD_API_KEY }}
          NEWS_API_ORG_KEY:     ${{ secrets.NEWS_API_ORG_KEY }}
          EIA_API_KEY:          ${{ secrets.EIA_API_KEY }}
        run: Rscript R/generate_data.R

      - name: Commit refreshed data if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily data refresh"
          file_pattern: "data/economy/*.csv data/economy/cache/*.csv data/presidential-economies/*.csv data/sentiment/*.csv data/sentiment/cache/*.csv data/cybersecurity/*.csv data/cybersecurity/cache/*.csv data/cybersecurity/cache/*.json data/cybersecurity/cache/*.csv.gz data/energy/*.csv data/energy/cache/*.csv"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Render Quarto site
        uses: quarto-dev/quarto-actions/render@v2

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  pdv:
    name: Post-Deploy Verification
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tests/pdv/package-lock.json

      - name: Install test dependencies
        working-directory: tests/pdv
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests/pdv
        run: npx playwright install --with-deps chromium

      - name: Run PDV tests
        working-directory: tests/pdv
        env:
          PDV_BASE_URL: ${{ needs.deploy.outputs.page_url || 'https://samcaldwell.info/' }}
          CI: "true"
        run: npx playwright test

      - name: Upload PDV report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdv-report
          path: |
            tests/pdv/playwright-report/
            tests/pdv/test-results/
          retention-days: 14
