name: Refresh data, render, and deploy

on:
  schedule:
    - cron: "30 11 * * *"   # daily at 11:30 UTC (~06:30 CT, after most FRED releases)
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::echarts4r
            any::plotly
            any::reactable
            any::sparkline
            any::crosstalk
            any::dplyr
            any::tidyr
            any::readr
            any::purrr
            any::scales
            any::htmltools
            any::rprojroot
            any::lubridate
            any::tibble
            any::fredr

      - name: Refresh data (FRED incremental fetch + build CSVs)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: Rscript R/generate_data.R

      - name: Commit refreshed data if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily data refresh"
          file_pattern: "data/cache/*.csv data/*.csv"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Render Quarto site
        uses: quarto-dev/quarto-actions/render@v2

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
