project:
  type: website
  output-dir: _site
  execute-dir: project
  render:
    - "index.qmd"
    - "economy/*.qmd"
  post-render:
    - python3 scripts/inline_assets.py
  resources:
    - "data/*.csv"
    - "favicon.svg"
    - "favicon.ico"
    - "CNAME"

website:
  title: "Analytics"
  description: "Interactive visual analyses of public topics — starting with the US economy."
  site-url: https://samcaldwell.info
  favicon: favicon.svg
  page-navigation: true
  navbar:
    background: primary
    left:
      - href: index.qmd
        text: Home
      - href: economy/index.qmd
        text: US Economy 2026
  sidebar:
    - title: "US Economy 2026"
      style: "floating"
      align: left
      contents:
        - href: economy/index.qmd
          text: "Overview"
        - href: economy/growth.qmd
          text: "Economic Growth"
        - href: economy/indicators.qmd
          text: "Indicators"
        - href: economy/markets.qmd
          text: "Economy vs Markets"
        - href: economy/about.qmd
          text: "Data & Citations"
  page-footer:
    center: "© 2026 Sam Caldwell. Sonora, Texas. [https://samcaldwell.net/](https://samcaldwell.net/)"

format:
  html:
    theme:
      - cosmo
    toc: true
    toc-depth: 3
    code-tools: false
    code-fold: true
    embed-resources: true
    self-contained-math: true
    author: "Sam Caldwell"
    lang: en-US
    include-in-header:
      - _includes/meta.html
    fig-width: 10
    fig-height: 5
    smooth-scroll: true
    link-external-newwindow: true

execute:
  freeze: auto
  warning: false
  message: false
