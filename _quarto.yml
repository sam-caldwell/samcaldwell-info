project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
  post-render:
    - python3 scripts/inline_assets.py
  resources:
    - "data/*.csv"
    - "favicon.svg"
    - "favicon.ico"
    - "CNAME"

website:
  title: "US Economy 2026 — Visual Analysis"
  description: "Interactive drill-down analysis of US economic indicators and markets, 2001-2026."
  site-url: https://samcaldwell.info
  favicon: favicon.svg
  page-navigation: true
  open-graph:
    locale: en_US
    site-name: samcaldwell.info
  twitter-card:
    card-style: summary_large_image
  navbar:
    background: primary
    left:
      - href: index.qmd
        text: Overview
      - href: growth.qmd
        text: Economic Growth
      - href: indicators.qmd
        text: Indicators
      - href: markets.qmd
        text: Economy vs Markets
      - href: about.qmd
        text: About
  page-footer:
    center: "Prototype — illustrative dataset. See *About* for data provenance."

format:
  html:
    theme:
      - cosmo
    toc: true
    toc-depth: 3
    code-tools: false
    code-fold: true
    embed-resources: true
    self-contained-math: true
    author: "Sam Caldwell"
    lang: en-US
    include-in-header:
      - _includes/meta.html
    fig-width: 10
    fig-height: 5
    smooth-scroll: true
    link-external-newwindow: true

execute:
  freeze: auto
  warning: false
  message: false
