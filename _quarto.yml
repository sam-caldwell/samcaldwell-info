  page-footer:
    # `SITE_UPDATED_AT_PLACEHOLDER` is replaced post-render by
    # scripts/stamp_updated.py with the UTC build timestamp.
    center: "© 2026 Sam Caldwell. Sonora, Texas. [https://samcaldwell.net/](https://samcaldwell.net/) · Updated: SITE_UPDATED_AT_PLACEHOLDER"

format:
  html:
    theme:
      - cosmo
    css:
      - styles.css
    toc: true
    toc-depth: 3
    toc-location: right
    code-tools: false
    code-fold: true
    author: "Sam Caldwell"
    lang: en-US
    include-in-header:
      - _includes/meta.html
    fig-width: 10
    fig-height: 5
    fig-responsive: true
    smooth-scroll: true
    link-external-newwindow: true
    mainfont: "system-ui, -apple-system, Segoe UI, Roboto, sans-serif"

execute:
  freeze: auto
  warning: false
  message: false
