project:
  type: website
  output-dir: _site
  execute-dir: project
  render:
    - "index.qmd"
    - "economy/*.qmd"
    - "presidential-economies/*.qmd"
    - "sentiment/*.qmd"
    - "cybersecurity/*.qmd"
    - "energy/*.qmd"
    - "west-texas/*.qmd"
  post-render:
    - python3 scripts/patch_jquery.py
    - python3 scripts/purge_vendor_metadata.py
    - python3 scripts/stamp_updated.py
  resources:
    - "data/economy/*.csv"
    - "data/presidential-economies/*.csv"
    - "data/sentiment/*.csv"
    - "data/sentiment/gdelt_tone_monthly.csv"
    - "data/sentiment/mediacloud_volume_monthly.csv"
    - "data/cybersecurity/*.csv"
    - "data/energy/*.csv"
    - "data/west-texas/*.csv"
    - "data/sentiment/network.json"
    - "js/d3.v7.min.js"
    - "favicon.svg"
    - "favicon.ico"
    - "CNAME"
    - "styles.css"

website:
  title: "Analytics"
  description: "Interactive visual analyses of public topics — starting with the US economy."
  site-url: https://samcaldwell.info
  favicon: favicon.svg
  page-navigation: true
  navbar:
    background: primary
    collapse-below: lg
    left:
      - href: index.qmd
        text: Home
      - href: economy/index.qmd
        text: US Economy 1999 to Present
      - href: presidential-economies/index.qmd
        text: Presidential Economies
      - href: sentiment/index.qmd
        text: Public Presidential Sentiment
      - href: cybersecurity/index.qmd
        text: Cybersecurity Threats
      - href: energy/index.qmd
        text: Energy
      - href: west-texas/index.qmd
        text: West Texas
  sidebar:
    - title: "US Economy 1999 to Present"
      style: "floating"
      align: left
      contents:
        - href: economy/index.qmd
          text: "Overview"
        - href: economy/growth.qmd
          text: "Economic Growth"
        - href: economy/indicators.qmd
          text: "Indicators"
        - href: economy/unemployment.qmd
          text: "Unemployment Deep-Dive"
        - href: economy/markets.qmd
          text: "Economy vs Markets"
        - href: economy/about.qmd
          text: "Data & Citations"
    - title: "Presidential Economies"
      style: "floating"
      align: left
      contents:
        - href: presidential-economies/index.qmd
          text: "Overview"
        - href: presidential-economies/growth.qmd
          text: "Growth by Admin"
        - href: presidential-economies/markets.qmd
          text: "Markets by Admin"
        - href: presidential-economies/fiscal.qmd
          text: "Fiscal by Admin"
        - href: presidential-economies/about.qmd
          text: "Methodology"
    - title: "Public Presidential Sentiment"
      style: "floating"
      align: left
      contents:
        - href: sentiment/index.qmd
          text: "Overview"
        - href: sentiment/approval.qmd
          text: "Political Approval"
        - href: sentiment/economic.qmd
          text: "Economic Sentiment"
        - href: sentiment/media.qmd
          text: "Media Sentiment"
        - href: sentiment/society.qmd
          text: "Society Radar"
        - href: sentiment/network.qmd
          text: "Network Graph"
        - href: sentiment/about.qmd
          text: "Methodology"
    - title: "Cybersecurity Threats"
      style: "floating"
      align: left
      contents:
        - href: cybersecurity/index.qmd
          text: "Overview"
        - href: cybersecurity/threats.qmd
          text: "Threat Sources"
        - href: cybersecurity/botnets.qmd
          text: "Botnet Hosts"
        - href: cybersecurity/cves.qmd
          text: "CVEs in the Wild"
        - href: cybersecurity/about.qmd
          text: "Methodology"
    - title: "Energy"
      style: "floating"
      align: left
      contents:
        - href: energy/index.qmd
          text: "Overview"
        - href: energy/us-markets.qmd
          text: "US Markets"
        - href: energy/intl-markets.qmd
          text: "International Markets"
        - href: energy/supply-demand.qmd
          text: "Supply & Demand"
        - href: energy/events.qmd
          text: "Events & Sentiment"
        - href: energy/forecasts.qmd
          text: "Forecasts"
        - href: energy/prices-map.qmd
          text: "Current Fuel Prices Map"
        - href: energy/change-map.qmd
          text: "10-Year Price Change Map"
        - href: energy/about.qmd
