    - title: "West Texas"
      style: "floating"
      align: left
      contents:
        - href: west-texas/index.qmd
          text: "Overview"
        - href: west-texas/unemployment.qmd
          text: "Unemployment"
        - href: west-texas/income.qmd
          text: "Per-Capita Income"
        - href: west-texas/gdp.qmd
